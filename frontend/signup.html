<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - ZENGardening</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
    <script src="/frontend/signup.js"></script>
    <style>
        body {
            background: #e0e5ec;
            font-family: Arial, sans-serif;
        }
        
        .neumorphic-card {
            background: #e0e5ec;
            border-radius: 20px;
            box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
            padding: 40px;
            width: 380px;
            margin: 60px auto;
            text-align: center;
        }
        
        .neumorphic-input,
        .neumorphic-button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            border: none;
            font-size: 16px;
        }
        
        .neumorphic-input {
            background: #e0e5ec;
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
            outline: none;
        }
        
        .neumorphic-button {
            background: #e0e5ec;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
            cursor: pointer;
            font-weight: bold;
        }
        
        .form-extra {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            margin-top: 15px;
        }
        
        .login-link {
            margin-top: 20px;
            font-size: 14px;
        }
        
        a {
            color: #007BFF;
            text-decoration: none;
        }
        
        footer {
            background-color: #d4e3d4;
            bottom: 0%;
        }
        
        .footer-container {
            color: black;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">🌿 ZENGardening</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/blog">Blogs</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/signup">Sign Up</a></li>
        </ul>
    </nav>
    <main>
        <section class="neumorphic-card">
            <div id="alertArea"></div>
            <h2>Create Account</h2>
            <form id="signupForm" method="post">
                <input type="text" id="name" name="name" class="neumorphic-input" placeholder="Full Name" required />
                <input type="email" id="email" name="email" class="neumorphic-input" placeholder="Email Address" required />
                <input type="password" id="password" name="password" class="neumorphic-input" placeholder="Password" required />
                <input type="password" id="confirm-password" name="confirmPassword" class="neumorphic-input" placeholder="Confirm Password" required />

                <div class="form-extra">
                    <input type="checkbox" id="terms" required />
                    <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
                </div>

                <button type="submit" class="neumorphic-button">Sign Up</button>
            </form>

            <div class="login-link">
                Already have an account? <a href="login.html">Back to Login</a>
            </div>
        </section>
    </main>

    <script>
        // Optional: Password match check
        const form = document.querySelector("form");
        form.addEventListener("submit", function(e) {
            const pass = document.getElementById("password").value;
            const confirm = document.getElementById("confirm-password").value;
            if (pass !== confirm) {
                e.preventDefault();
                alert("Passwords do not match!");
            }
        });
    </script>

    <footer>
        <div class="footer-container">© 2025 ZENGardening. All rights reserved.</div>
    </footer>
</body>

</html>
