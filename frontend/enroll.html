<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enroll in a Gardening Course</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f8f5;
            padding: 2rem;
            color: #333;
        }
        
        .enroll-container {
            background: #fff;
            max-width: 600px;
            margin: auto;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #2e7d32;
            margin-bottom: 1.5rem;
        }
        
        label {
            font-weight: bold;
            margin-top: 1rem;
            display: block;
        }
        
        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        
        button {
            background-color: #2e7d32;
            color: #fff;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #1b5e20;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            text-decoration: none;
            color: #2e7d32;
        }
    </style>
</head>

<body>

    <div class="enroll-container">
        <h1>🌼 Enroll in a Gardening Course</h1>
        <form action="#" method="post">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required />

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required />

            <label for="course">Select Course:</label>
            <select id="course" name="course" required>
        <option value="">-- Choose a Course --</option>
        <option value="rose">Rose Gardening</option>
        <option value="dahlia">Dahlia Course</option>
        <option value="tulip">Tulip Course</option>
        <option value="sunflower">Sunflower Course</option>
        <option value="lavender">Lavender Course</option>
        <option value="marigold">Marigold Course</option>
      </select>

            <label for="message">Message (optional):</label>
            <textarea id="message" name="message" rows="4"></textarea>

            <button type="submit">Submit Enrollment</button>
        </form>
        <a class="back-link" href="index.html">⬅ Back to Home</a>
    </div>


</body>

</html>
